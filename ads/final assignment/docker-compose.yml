version: '3.8'

services:
  backend:
    build: ./backend
    container_name: express_app
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongo
    environment:
      - PG_HOST=postgres
      - PG_USER=admin
      - PG_PASSWORD=admin123
      - PG_DB=ecommerce_db
      - MONGO_URI=mongodb://mongo:27017/ecommerce_db

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ecommerce_db
    ports:
      - "5431:5431"

  mongo:
    image: mongo:4.4
    container_name: mongo_db
    ports:
      - "27017:27017"